# Cylentic — Docker Compose (MVP)
# services: app, postgres, redis, sandbox
version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cylentic
      POSTGRES_USER: cylentic
      POSTGRES_PASSWORD: cylentic
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
