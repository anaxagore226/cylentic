# Cylentic — Docker Compose (MVP)
# services: app, mysql, redis, sandbox
version: "3.9"
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: cylentic
      MYSQL_USER: cylentic
      MYSQL_PASSWORD: cylentic
      MYSQL_ROOT_PASSWORD: cylentic
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
